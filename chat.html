<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benidik - شات AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#e5ddd5; display:flex; flex-direction:column; height:100vh; }
.header { background:#075e54; color:white; padding:15px; text-align:center; font-size:20px; font-weight:700; }
.messages { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:80%; padding:10px 15px; border-radius:15px; font-size:15px; line-height:1.6; }
.bot { background:white; align-self:flex-start; }
.user { background:#dcf8c6; align-self:flex-end; }
.input-area { display:flex; padding:10px; background:#f0f0f0; gap:10px; }
input { flex:1; padding:12px 15px; border-radius:25px; border:none; font-family:'Cairo',sans-serif; font-size:15px; outline:none; }
button { background:#25d366; color:white; border:none; border-radius:50%; width:48px; height:48px; font-size:20px; cursor:pointer; }
</style>
</head>
<body>
<div class="header">🤖 Benidik - مساعدك الذكي</div>
<div class="messages" id="messages">
  <div class="msg bot">مرحباً! أنا Benidik، كيف يمكنني مساعدتك؟ 😊</div>
</div>
<div class="input-area">
  <button onclick="send()">➤</button>
  <input id="inp" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')send()">
</div>
<script>
const KEY = "AIzaSyCFoGe9uUXUCIO5vVLbXBfwt3h-FkxnBzs";

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  inp.value = '';
  const load = addMsg('...', 'bot');

  const res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + KEY,
    {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({contents:[{parts:[{text:text}]}]})
    }
  );
  const d = await res.json();
  load.remove();
  addMsg(d.candidates[0].content.parts[0].text, 'bot');
}

function addMsg(t, type) {
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = t;
  const m = document.getElementById('messages');
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
  return d;
}
</script>
</body>
</html>
